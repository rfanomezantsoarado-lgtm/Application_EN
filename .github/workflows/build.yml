name: CI
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: buildozer-${{ hashFiles('buildozer.spec') }}
        
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip \
          python3-pip python3-dev \
          libffi-dev libssl-dev \
          autoconf automake build-essential \
          libtool pkg-config cmake \
          openjdk-17-jdk
        
    - name: Install Buildozer
      run: |
        pip3 install --user buildozer
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        
    - name: Accept Android Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        yes | $HOME/.local/bin/buildozer android update || true
        
        if [ -f ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager ]; then
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        fi
        
    - name: Build APK
      run: |
        echo "android.accept_sdk_license = True" >> buildozer.spec
        buildozer -v android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: application-apk
        path: bin/*.apk
