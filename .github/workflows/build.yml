name: CI
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # Use 22.04, it's more stable
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install ALL system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf \
          automake \
          libtool \
          pkg-config \
          make \
          gcc \
          g++ \
          libffi-dev \
          libssl-dev \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          git \
          zip \
          unzip \
          python3-pip \
          python3-dev
          
    - name: Setup Libtool PATH (Critical fix)
      run: |
        # Ensure libtoolize is in PATH
        sudo ln -sf /usr/bin/libtoolize /usr/bin/glibtoolize || true
        which libtoolize
        libtoolize --version
        
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: buildozer-${{ hashFiles('buildozer.spec') }}
        
    - name: Build APK
      uses: ArtemSBulgakov/buildozer-action@v1
      id: buildozer
      env:
        # Force libtool to be found
        PATH: /usr/bin:$PATH
      with:
        command: buildozer android debug
        workdir: ./
        buildozer_version: stable
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: application-apk
        path: bin/*.apk
