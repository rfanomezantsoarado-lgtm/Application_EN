- name: Install system dependencies
  run: |
    sudo apt-get update

    sudo apt-get install -y \
      openjdk-17-jdk \
      python3-pip \
      python3-setuptools \
      python3-wheel \
      python3-dev \
      git \
      zip \
      unzip \
      autoconf \
      automake \
      libtool \
      pkg-config \
      zlib1g-dev \
      libncurses5-dev \
      libncursesw5-dev \
      cmake \
      libffi-dev \
      libssl-dev \
      build-essential \
      ccache \
      libltdl-dev

- name: Set JAVA_HOME to Java 17
  run: |
    echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
    echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

    java -version
    echo $JAVA_HOME
