name: CI
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: buildozer-${{ hashFiles('buildozer.spec') }}
        
    - name: Setup Java
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk openjdk-17-jre
        java -version
        
    - name: Install Buildozer dependencies
      run: |
        sudo apt install -y \
          git \
          zip \
          unzip \
          python3-pip \
          python3-dev \
          libffi-dev \
          libssl-dev \
          liblzma-dev \
          autoconf \
          automake \
          build-essential \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake
        
    - name: Install Buildozer
      run: |
        pip3 install --user buildozer cython
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        
    - name: Build APK
      run: |
        buildozer -v android debug  
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: application-apk
        path: bin/*.apk
