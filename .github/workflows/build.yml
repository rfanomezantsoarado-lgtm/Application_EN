name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt update

        sudo apt install -y \
          python3-pip \
          python3-setuptools \
          python3-wheel \
          python3-dev \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          automake \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          build-essential \
          ccache \
          libltdl-dev

    - name: Fix libtoolize
      run: |
        sudo ln -sf /usr/bin/libtoolize /usr/bin/glibtoolize || true
        which libtoolize
        libtoolize --version

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade cython virtualenv

    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          .buildozer
          ~/.buildozer
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

    - name: Build with Buildozer
      uses: ArtemSBulgakov/buildozer-action@v1
      with:
        command: buildozer android debug
        buildozer_version: stable

      env:
        ANDROIDAPI: 33
        ANDROIDMINAPI: 21
        ANDROIDNDK: 25b
        ANDROIDSDK: /usr/local/lib/android/sdk
        PATH: /usr/bin:$PATH

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
