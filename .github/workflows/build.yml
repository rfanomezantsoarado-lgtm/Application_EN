name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Télécharger projet
        uses: actions/checkout@v4

      - name: Compiler APK avec Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: buildozer android debug

      - name: Sauvegarder APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk